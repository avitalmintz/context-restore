services:
  - type: web
    name: context-restore-api
    runtime: docker
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: context-restore-db
          property: connectionString
      - key: DEV_API_TOKEN
        generateValue: true
      - key: DEV_USER_ID
        value: 11111111-1111-1111-1111-111111111111
      - key: DEV_USER_EMAIL
        value: you@example.com

databases:
  - name: context-restore-db
