services:
  postgres:
    image: postgres:16
    container_name: context-restore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: context_restore
    ports:
      - "55432:5432"
    volumes:
      - context_restore_pgdata:/var/lib/postgresql/data

volumes:
  context_restore_pgdata:
