<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Context Restore Briefing</title>
    <link rel="stylesheet" href="./briefing.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>Context Restore</h1>
        <p>Your intent, progress, and next step from recent browsing.</p>
        <div class="toolbar">
          <button id="refresh">Refresh</button>
          <label class="toggle">
            <input id="show-done" type="checkbox" />
            Show completed
          </label>
          <a href="../settings/settings.html" target="_blank" rel="noreferrer">Settings</a>
        </div>
        <p id="source-info" class="source-info"></p>
        <div class="mode-tabs" role="tablist" aria-label="Briefing Views">
          <button class="mode-tab active" data-mode="overview" role="tab" aria-selected="true">Overview</button>
          <button class="mode-tab" data-mode="daily" role="tab" aria-selected="false">Daily Recap</button>
          <button class="mode-tab" data-mode="detailed" role="tab" aria-selected="false">Action Plan</button>
        </div>
      </header>
      <section id="task-list" class="panel"></section>
      <section id="daily-summary" class="panel" hidden></section>
      <section id="detailed-briefing" class="panel" hidden></section>
      <p id="empty" hidden>No active tasks yet. Browse, then refresh.</p>
    </main>
    <script type="module" src="./briefing.js"></script>
  </body>
</html>
