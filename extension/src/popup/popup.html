<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Context Restore</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f6f2;
        --surface: #ffffff;
        --text: #1f1f1a;
        --muted: #66665c;
        --line: #e5e1d8;
        --accent: #1b6f4a;
      }

      body {
        margin: 0;
        width: 360px;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrap {
        padding: 14px;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 16px;
      }

      .sub {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 12px;
      }

      .task {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 8px;
      }

      .task-title {
        font-weight: 600;
        font-size: 13px;
      }

      .task-meta {
        margin-top: 4px;
        font-size: 12px;
        color: var(--muted);
      }

      .task-brief {
        margin-top: 6px;
        font-size: 12px;
        line-height: 1.35;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      .primary {
        background: var(--accent);
        color: #fff;
      }

      .ghost {
        background: #ecece5;
        color: var(--text);
      }

      #empty {
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Context Restore</h1>
      <p class="sub">What you were trying to do, where you left off, and what next.</p>
      <div id="tasks"></div>
      <p id="empty" hidden>No tasks yet. Browse a bit and come back.</p>
      <div class="actions">
        <button id="open-briefing" class="primary">Open Full Briefing</button>
      </div>
    </div>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
